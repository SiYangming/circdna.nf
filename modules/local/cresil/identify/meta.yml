name: "cresil_identify"
description: Identify and validate eccDNA from enrichment data
keywords:
  - eccDNA
  - long-read
  - identification
  - circular-dna
tools:
  - cresil:
      description: Circular DNA Identification Tool
      homepage: https://gitlab.com/visanu/cresil
      documentation: https://gitlab.com/visanu/cresil
      tool_dev_url: https://gitlab.com/visanu/cresil
      doi: "10.1093/bib/bbac422"
      licence: ["MIT"]

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - fasta:
        type: file
        description: Reference genome FASTA file
        pattern: "*.{fa,fasta,fa.gz,fasta.gz}"
  - - meta2:
        type: map
        description: |
          Groovy Map containing reference index information
          e.g. `[ id:'ref' ]`
    - fai:
        type: file
        description: FASTA index file
        pattern: "*.fai"
  - - meta3:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - reads:
        type: file
        description: Input FASTQ or FASTA file of long reads
        pattern: "*.{fastq,fq,fasta,fa,fastq.gz,fq.gz,fasta.gz,fa.gz}"
  - - meta4:
        type: map
        description: |
          Groovy Map containing trim result information
          e.g. `[ id:'sample1' ]`
    - trim:
        type: file
        description: Trim result table from cresil trim (optional)
        pattern: "*.trim.txt"

output:
  - identify:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.eccDNA_final.txt":
          type: file
          description: Final eccDNA list
          pattern: "*eccDNA_final.txt"
  - versions_cresil:
      - "${task.process}":
          type: string
          description: Process name
      - cresil:
          type: string
          description: Tool name
      - version:
          type: string
          description: Tool version

authors:
  - "@SiYangming"
maintainers:
  - "@SiYangming"
