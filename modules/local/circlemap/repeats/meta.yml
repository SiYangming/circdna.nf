name: circlemap_repeats
description: Detect eccDNA arising from repeat regions using Circle-Map Repeats
keywords:
  - circle-map
  - eccdna
  - repeats
tools:
  - circle-map:
      description: Circle-Map detects extrachromosomal circular DNA from short-read WGS
      homepage: https://github.com/iprada/Circle-Map
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: Groovy Map containing sample information
  - bam:
      type: file
      description: Coordinate sorted candidate read BAM
  - bai:
      type: file
      description: BAI index for bam
output:
  - bed:
      type: file
      description: Detected repeat-derived eccDNA coordinates BED
      pattern: "*.bed"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@SiYangming"
