name: pbccs
description: "PacBio Circular Consensus Sequencing (CCS) generates HiFi reads from subreads"
keywords:
  - pacbio
  - ccs
  - hifi
  - sequencing

tools:
  - pbccs:
      description: "Generate HiFi reads from PacBio subreads"
      homepage: https://github.com/PacificBiosciences/ccs
      documentation: https://ccs.how/
      tool_dev_url: https://github.com/PacificBiosciences/ccs

input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - subreads_bam:
      type: file
      description: PacBio subreads BAM file
      pattern: "*.bam"
  - subreads_bai:
      type: file
      description: BAM index file
      pattern: "*.bai"

output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - hifi_fastq:
      type: file
      description: HiFi reads in FASTQ format
      pattern: "*.hifi_reads.fastq.gz"
  - report:
      type: file
      description: CCS report file
      pattern: "*.ccs_report.txt"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@SiYangming"