---
name: "nf-core/cnvkit/batch"
description: "Copy number variant detection from high-throughput sequencing data"
keywords:
- "cnvkit"
- "bam"
- "fasta"
- "copy number"
tools:
- cnvkit:
    description: "CNVkit is a Python library and command-line software toolkit to\
      \ infer and visualize copy number from high-throughput DNA sequencing data.\
      \ It is designed for use with hybrid capture, including both whole-exome and\
      \ custom target panels, and short-read sequencing platforms such as Illumina\
      \ and Ion Torrent.\n"
    homepage: "https://cnvkit.readthedocs.io/en/stable/index.html"
    documentation: "https://cnvkit.readthedocs.io/en/stable/index.html"
    licence:
    - "Apache-2.0"
    identifier: "biotools:cnvkit"
input:
- - meta:
      type: "map"
      description: "Groovy Map containing sample information\ne.g. [ id:'test', single_end:false\
        \ ]\n"
  - tumor:
      type: "file"
      description: "Input tumour sample bam file (or cram)\n"
      pattern: "*.{bam,cram}"
      ontologies:
      - edam: "http://edamontology.org/format_2572"
      - edam: "http://edamontology.org/format_3462"
  - tumor_index:
      type: "file"
      description: "Input tumour sample bam/cram index file (only needed for bam input)\n"
      pattern: "*.{bai,crai}"
      ontologies:
      - edam: "http://edamontology.org/format_3327"
  - normal:
      type: "file"
      description: "Input normal sample bam file (or cram)\n"
      pattern: "*.{bam,cram}"
      ontologies:
      - edam: "http://edamontology.org/format_2572"
      - edam: "http://edamontology.org/format_3462"
  - normal_index:
      type: "file"
      description: "Input normal sample bam/cram index file (only needed for bam input)\n"
      pattern: "*.{bai,crai}"
      ontologies:
      - edam: "http://edamontology.org/format_3327"
- - meta2:
      type: "map"
      description: "Groovy Map containing reference information\ne.g. [ id:'test'\
        \ ]\n"
  - fasta:
      type: "file"
      description: "Input reference genome fasta file (only needed for cram_input\
        \ and/or when normal_samples are provided)\n"
      pattern: "*.{fa,fasta}"
      ontologies:
      - edam: "http://edamontology.org/format_1929"
  - fasta_fai:
      type: "file"
      description: "Input reference genome fasta index (optional, but recommended\
        \ for cram_input)\n"
      pattern: "*.{fai}"
      ontologies: []
- - meta4:
      type: "map"
      description: "Groovy Map containing information about target file\ne.g. [ id:'test'\
        \ ]\n"
  - targets:
      type: "file"
      description: "Input target bed file\n"
      pattern: "*.{bed}"
      ontologies:
      - edam: "http://edamontology.org/format_3003"
- - meta5:
      type: "map"
      description: "Groovy Map containing information about reference file\ne.g. [\
        \ id:'test' ]\n"
  - reference:
      type: "file"
      description: "Input reference cnn-file (only for germline and tumor-only running)\n"
      pattern: "*.{cnn}"
      ontologies: []
- panel_of_normals:
    type: "file"
    description: "Input panel of normals file\n"
    pattern: "*.{cnn}"
    ontologies: []
output:
  bed:
  - - meta:
        type: "map"
        description: "Groovy Map containing sample information\ne.g. [ id:'test',\
          \ single_end:false ]\n"
    - '*.bed':
        type: "file"
        description: "File containing genomic regions"
        pattern: "*.{bed}"
        ontologies:
        - edam: "http://edamontology.org/format_3003"
  cnn:
  - - meta:
        type: "map"
        description: "Groovy Map containing sample information\ne.g. [ id:'test',\
          \ single_end:false ]\n"
    - '*.cnn':
        type: "file"
        description: "File containing coverage information"
        pattern: "*.{cnn}"
        ontologies: []
  cnr:
  - - meta:
        type: "map"
        description: "Groovy Map containing sample information\ne.g. [ id:'test',\
          \ single_end:false ]\n"
    - '*.cnr':
        type: "file"
        description: "File containing copy number ratio information"
        pattern: "*.{cnr}"
        ontologies: []
  cns:
  - - meta:
        type: "map"
        description: "Groovy Map containing sample information\ne.g. [ id:'test',\
          \ single_end:false ]\n"
    - '*.cns':
        type: "file"
        description: "File containing copy number segment information"
        pattern: "*.{cns}"
        ontologies: []
  pdf:
  - - meta:
        type: "map"
        description: "Groovy Map containing sample information\ne.g. [ id:'test',\
          \ single_end:false ]\n"
    - '*.pdf':
        type: "file"
        description: "File with plot of copy numbers or segments on chromosomes"
        pattern: "*.{pdf}"
        ontologies:
        - edam: "http://edamontology.org/format_3508"
  png:
  - - meta:
        type: "map"
        description: "Groovy Map containing sample information\ne.g. [ id:'test',\
          \ single_end:false ]\n"
    - '*.png':
        type: "file"
        description: "File with plot of bin-level log2 coverages and segmentation\
          \ calls"
        pattern: "*.{png}"
        ontologies:
        - edam: "http://edamontology.org/format_3603"
  versions_cnvkit:
  - - ${task.process}:
        type: "string"
        description: "The name of the process"
    - cnvkit:
        type: "string"
        description: "The name of the tool"
    - cnvkit.py version | sed -e "s/cnvkit v//g":
        type: "eval"
        description: "The expression to obtain the version of the tool"
  versions_samtools:
  - - ${task.process}:
        type: "string"
        description: "The name of the process"
    - samtools:
        type: "string"
        description: "The name of the tool"
    - samtools version | sed '1!d;s/.* //':
        type: "eval"
        description: "The expression to obtain the version of the tool"
topics:
  versions:
  - - ${task.process}:
        type: "string"
        description: "The name of the process"
    - cnvkit:
        type: "string"
        description: "The name of the tool"
    - cnvkit.py version | sed -e "s/cnvkit v//g":
        type: "eval"
        description: "The expression to obtain the version of the tool"
  - - ${task.process}:
        type: "string"
        description: "The name of the process"
    - samtools:
        type: "string"
        description: "The name of the tool"
    - samtools version | sed '1!d;s/.* //':
        type: "eval"
        description: "The expression to obtain the version of the tool"
authors:
